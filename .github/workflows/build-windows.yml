name: Build Windows Executable

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install opencv-python numpy pyinstaller

      - name: Build executable
        run: pyinstaller --onefile --windowed --name Stillness stillness.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stillness-Windows
          path: dist/Stillness.exe
